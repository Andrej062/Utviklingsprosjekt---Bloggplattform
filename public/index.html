<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySocialSpace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div>
            <h1>MySocialSpace</h1>
            <p>En enkel sosial plattform</p>
        </div>
        <nav class="top-nav">
            <a href="#topPanels">Nytt innlegg</a>
            <a href="#feed">Innlegg</a>
            <button type="button" id="openRegisterModal">Registrer bruker</button>
            <button type="button" id="openUsersModal">Vis brukere</button>
        </nav>
    </header>

    <main class="container">
        <section id="topPanels" class="top-panels">
            <section class="chat-panel">
                <div class="chat-header">
                    <div>
                        <h2>Chat</h2>
                        <p>Snakk med andre brukere ved siden av innleggene.</p>
                    </div>
                </div>

                <div class="chat-controls">
                    <div>
                        <label class="form-label" for="chatConversation">Velg samtale</label>
                        <select id="chatConversation"></select>
                    </div>
                    <div>
                        <label class="form-label" for="chatUser">Skriv som</label>
                        <select id="chatUser"></select>
                    </div>
                </div>

                <div id="chatMessages" class="chat-messages"></div>

                <form id="chatForm" class="chat-form">
                    <input type="text" id="chatContent" placeholder="Skriv en melding..." required>
                    <button type="submit">Send</button>
                </form>
            </section>

            <section id="create-post" class="create-post">
                <div class="create-post-header">
                    <div>
                        <h2>Lag et innlegg</h2>
                        <p>Velg bruker, skriv en tekst og legg gjerne til et bilde.</p>
                    </div>
                </div>

                <form id="postForm">
                    <label class="form-label" for="userId">Hvem publiserer?</label>
                    <select id="userId" required>
                        <option value="">Velg bruker</option>
                    </select>

                    <label class="form-label" for="content">Hva vil du dele?</label>
                    <textarea id="content" placeholder="Skriv innlegget ditt her..." required></textarea>

                    <label class="form-label" for="postImage">Legg til bilde (valgfritt)</label>
                    <input type="file" id="postImage" accept="image/*">
                    <img id="imagePreview" class="image-preview hidden" alt="Forhåndsvisning av bilde">

                    <div class="form-footer">
                        <p class="form-help">Innlegget blir vist i feeden med en gang.</p>
                        <button type="submit">Publiser innlegg</button>
                    </div>
                </form>
            </section>
        </section>

        <section id="feed" class="feed">
            <h2>Innlegg</h2>
            <div id="postsContainer"></div>
        </section>
    </main>

    <div id="registerModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Registrer ny bruker</h2>
                <button type="button" class="close-modal" data-close="registerModal">Lukk</button>
            </div>

            <form id="registerForm" class="modal-form">
                <input type="text" id="registerUsername" placeholder="Brukernavn" required>
                <input type="email" id="registerEmail" placeholder="E-post" required>
                <input type="password" id="registerPassword" placeholder="Passord" required>
                <textarea id="registerBio" placeholder="Kort bio"></textarea>
                <button type="submit">Lagre bruker</button>
            </form>

            <p id="registerMessage" class="modal-message"></p>
        </div>
    </div>

    <div id="usersModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Brukere i databasen</h2>
                <button type="button" class="close-modal" data-close="usersModal">Lukk</button>
            </div>

            <div id="usersContainer" class="users-list"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
